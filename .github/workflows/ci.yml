name: CI

on:
  push:
    branches: [main, devel]
  pull_request:

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # Lightweight stack covering the MSM and CV-method tests. The heavy MD
          # backends (openmm, MDAnalysis) are not required: tests that need them
          # skip automatically via pytest.importorskip.
          pip install numpy scipy scikit-learn pydantic pyyaml deeptime pytest ruff
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Lint (ruff)
        run: ruff check autosampler/msm autosampler/execution autosampler/spaces/registry.py autosampler/spaces/spib.py autosampler/spaces/feature_selection.py autosampler/spawners/msm.py autosampler/reporting.py autosampler/engines/base.py tests

      - name: Run test suite
        run: pytest -q
