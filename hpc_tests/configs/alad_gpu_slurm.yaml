# HPC test config — GPU queue, SLURM backend.
#
# Same small alanine-dipeptide workload, but on the OpenMM CUDA platform with
# one GPU per array element. This specifically validates that each walker binds
# to the GPU the scheduler allocated (via CUDA_VISIBLE_DEVICES) instead of every
# task clobbering device 0 — see hpc_tests/DEBUGGING.md CODE=GPU_BINDING.
#
# Validate first:  trails-md --config hpc_tests/configs/alad_gpu_slurm.yaml --check

system:
  conf_file: ../../examples/alanine_dipeptide/structure.pdb
  top_file: ../../examples/alanine_dipeptide/structure.pdb
  topology: amber
  system_file: ../../examples/alanine_dipeptide/system.py
  project_file: ../../examples/alanine_dipeptide/project_phi_psi.py
  trajectory_topology_file: ../../examples/alanine_dipeptide/structure.pdb
  feature_selection: "protein and not (type H)"

engine:
  md_engine: openmm
  platform_name: CUDA          # GPU queue
  precision: mixed
  temperature: 300.0
  dt: 0.002
  npt: false

spawning:
  spawn_scheme: density
  spawn_type: hard
  search_mode: explore
  walker: 8
  step: 5000                   # a bit longer so GPU walkers aren't dominated by startup
  stride: 100
  max_workers: 8

execution:
  backend: slurm
  # ---- EDIT FOR YOUR SITE ----
  partition: null              # e.g. "gpu"
  account: null
  walltime: "00:30:00"
  cpus_per_task: 4
  gpus_per_task: 1             # one GPU per walker
  memory: "8G"
  module_loads: []             # e.g. ["module load cuda/12.2", "module load anaconda3"]
  extra_directives: []         # e.g. ["#SBATCH --gres=gpu:1"] if your site needs --gres
  max_retries: 1
  poll_interval: 15
  max_in_flight: 8
  marker_grace: 30
  wait_timeout: null

space_mode: fixed
n_bins: [18, 18]
min_values: [-3.141592653589793, -3.141592653589793]
max_values: [3.141592653589793, 3.141592653589793]

outdir: runs/hpc_alad_gpu_slurm
random_seed: 42
checkpoint_freq: 1
min_success_fraction: 1.0
save_features: false
