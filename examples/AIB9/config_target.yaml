# Target-mode search: drive sampling toward a chosen point in the learned CV space.
system:
  conf_file: aib9_equilibrated.pdb
  top_file: aib9_equilibrated.pdb
  topology: charmm
  system_file: system.py
  trajectory_topology_file: aib9_equilibrated.pdb
  feature_selection: "resname AIB and name N CA C O CB1 CB2"

engine:
  md_engine: openmm
  platform_name: CUDA          # use CPU if no GPU (slower)
  precision: mixed
  npt: true
  temperature: 400.0
  dt: 0.002

spawning:
  spawn_scheme: density
  spawn_type: probabilistic
  search_mode: target          # bias spawning toward `target`
  target: [0.0, 0.0]           # target coordinates in the 2-D latent CV space
  walker: 10
  step: 5000
  stride: 50
  max_workers: 1

space_mode: tica
adaptive_feature_type: distances
retrain_freq: 5
aggregate_memory: true
max_adaptive_memory_frames: 5000

outdir: runs/aib9_target
random_seed: 7
checkpoint_freq: 1
n_bins: [30, 30]
