# Weighted-ensemble (WE) resampling spawner on AIB9 (fixed phi/psi CVs).
system:
  conf_file: aib9_equilibrated.pdb
  top_file: aib9_equilibrated.pdb
  topology: charmm
  system_file: system.py
  trajectory_topology_file: aib9_equilibrated.pdb
  feature_selection: "resname AIB and name N CA C O CB1 CB2"

engine:
  md_engine: openmm
  platform_name: CUDA          # use CPU if no GPU (slower)
  precision: mixed
  npt: true
  temperature: 400.0
  dt: 0.002

spawning:
  spawn_scheme: we             # weight-conserving split/merge per occupied bin
  we_target_per_bin: 4
  search_mode: explore
  walker: 16
  step: 5000
  stride: 50
  max_workers: 1

space_mode: tica
adaptive_feature_type: distances
retrain_freq: 5
aggregate_memory: true
max_adaptive_memory_frames: 5000

outdir: runs/aib9_we
random_seed: 7
checkpoint_freq: 1
n_bins: [30, 30]
