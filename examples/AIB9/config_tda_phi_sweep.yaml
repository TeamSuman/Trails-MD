# TDA (topological-data-analysis) phi-sweep example for AIB9.
#
# This example is NOT self-contained: it needs external assets that are not
# shipped in the repo (they are large). Obtain them before running:
#   * Structure/topology from Zenodo record 14679134
#     (https://zenodo.org/records/14679134) -> place aib9.gro and topol.top under
#     reference/zenodo_14679134/ (paths below).
#   * A trained TDA baseline model at
#     training_data/aib9_lr_tda/tda_baseline/tda_baseline_model.pt, loaded by
#     project_tda_phi_psi.py. Train/obtain it separately.
# With those in place, run as any other config (`trails-md --config ...`).
system:
  conf_file: reference/zenodo_14679134/aib9.gro
  top_file: reference/zenodo_14679134/topol.top
  topology: gromacs
  project_file: project_tda_phi_psi.py
  trajectory_topology_file: reference/zenodo_14679134/aib9.gro
  feature_selection: "resname AIB"

engine:
  md_engine: openmm
  platform_name: CUDA
  precision: mixed
  npt: true
  equilibrate: false
  temperature: 400.0
  pressure: 1.0
  dt: 0.002

spawning:
  spawn_scheme: density
  spawn_type: hard
  search_mode: explore
  walker: 12
  step: 5000
  stride: 50
  max_workers: 1
  recent_density_window: 3
  resolution_check_patience: 2
  lof_neighbors: 5
  voronoi_clusters: 16
  voronoi_periodic: false
  voronoi_grid_size: 100

space_mode: fixed
n_bins: [40, 40]
min_values: [-1.25, -3.141592653589793]
max_values: [1.25, 3.141592653589793]
outdir: runs/tda_phi_sweep_residue5_phi
random_seed: 17
checkpoint_freq: 1
save_features: true
retrain_freq: 0
aggregate_memory: false
