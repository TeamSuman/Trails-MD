system:
  conf_file: aib9_equilibrated.pdb
  top_file: aib9_equilibrated.pdb
  topology: charmm
  system_file: system.py
  trajectory_topology_file: aib9_equilibrated.pdb
  feature_selection: "resname AIB"

engine:
  md_engine: openmm
  platform_name: CUDA
  precision: mixed
  npt: true
  equilibrate: false
  temperature: 400.0
  pressure: 1.0
  dt: 0.001

spawning:
  spawn_scheme: density
  spawn_type: hard
  search_mode: explore
  walker: 10
  step: 5000
  stride: 50
  max_workers: 1
  recent_density_window: 3
  resolution_check_patience: 2
  lof_neighbors: 5
  voronoi_clusters: 12
  voronoi_periodic: false
  voronoi_grid_size: 80

space_mode: tvae
adaptive_feature_type: phi_psi
aggregate_memory: true
max_adaptive_memory_frames: 20000000
outdir: runs/adaptive_phi_psi_tvae
random_seed: 7
checkpoint_freq: 1
save_features: true
retrain_freq: 5
n_bins: [36, 36]
