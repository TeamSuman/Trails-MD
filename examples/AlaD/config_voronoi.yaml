system:
  conf_file: start.gro
  top_file: topol.top
  topology: gromacs
  project_file: project_phi_psi.py
  trajectory_topology_file: start.gro
  feature_selection: "protein and not (type H)"

engine:
  # md_engine: gromacs
  md_engine: openmm
  platform: CUDA
  gromacs_executable: gmx
  gromacs_include_dir: /home/dm/Soft/GMX26/share/gromacs/top
  temperature: 300.0
  pressure: 1.0
  dt: 0.002
  npt: true
  equilibrate: false

spawning:
  spawn_scheme: voronoi
  voronoi_clusters: 1500
  spawn_type: hard
  search_mode: explore
  walker: 16
  step: 5000
  stride: 50
  max_workers: 1
  recent_density_window: 0
  resolution_check_patience: 5

space_mode: fixed
n_bins: [36, 36]
min_values: [-3.141592653589793, -3.141592653589793]
max_values: [3.141592653589793, 3.141592653589793]
outdir: runs/alad_phi_psi_voro
random_seed: 42
checkpoint_freq: 1
save_features: false
