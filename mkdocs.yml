site_name: Trails-MD
site_description: Adaptive molecular dynamics sampling with engine-agnostic walkers, fixed and learned collective variables, and lineage-aware spawning
site_url: https://teamsuman.github.io/Trails-MD/
repo_url: https://github.com/TeamSuman/Trails-MD
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Concepts: concepts.md
  - The input file: input_file.md
  - Configuration reference: configuration.md
  - Collective variables: cv_methods.md
  - MSM & kinetic seeding: msm.md
  - Execution (workstation & HPC): execution.md
  - HPC scaling & WESTPA comparison: hpc_scaling.md
  - CLI reference: cli.md
  - References: references.md
  - Tutorials:
      - Alanine dipeptide: tutorials/alad.md
      - AIB9: tutorials/aib9.md
  - Results in the paper: results_in_paper.md

exclude_docs: |
  feature_selection.md
  binning.md
  api.md
  notebook_tutorial.md
  analysis.md
  tutorials/adaptive_msm.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - toc:
      permalink: true
