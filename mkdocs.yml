site_name: AutoSampler
site_description: Autonomous adaptive MD sampling driven to MSM convergence
repo_url: https://github.com/TeamSuman/AutoSampler
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - The input file: input_file.md
  - Concepts: concepts.md
  - Configuration reference: configuration.md
  - Collective variables: cv_methods.md
  - Feature selection (VAMP-2): feature_selection.md
  - MSM & convergence: msm.md
  - Analysis & plotting: analysis.md
  - Execution (workstation & HPC): execution.md
  - Tutorial — adaptive MSM: tutorials/adaptive_msm.md
  - Tutorial — notebook: notebook_tutorial.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - toc:
      permalink: true
