name: trails-md
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - setuptools>=68
  - wheel
  - numpy>=1.23
  - scipy>=1.9
  - shapely>=2.0          # required by the Voronoi spawner/binner (core dependency)
  - pydantic>=2.0         # code uses Pydantic v2 (field_validator/model_validator)
  - pyyaml>=6.0
  - scikit-learn>=1.2
  - mdanalysis>=2.5
  - openmm>=8.0
  - pytorch>=2.0
  - deeptime>=0.4
  - matplotlib>=3.7
  - pytest>=7.0
  - pip:
      # Optional deep-CV backends (space_mode: deep-tica / deep-lda).
      - lightning>=2.0
      - mlcolvar>=1.0
      - -e .
